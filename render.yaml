services:
  - type: web
    name: sobol2-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars: []
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: sobol2
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
